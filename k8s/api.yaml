apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: orderflow-api:latest
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: postgresql://orderflow:orderflow123@postgres:5432/orderflow
            - name: RABBITMQ_URL
              value: amqp://orderflow:orderflow123@rabbitmq:5672/
            - name: REDIS_URL
              value: redis://redis:6379
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
