apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sync-worker
  template:
    metadata:
      labels:
        app: sync-worker
    spec:
      containers:
        - name: sync-worker
          image: orderflow-worker:latest
          imagePullPolicy: Never
          command: ["python", "sync_worker.py"]
          env:
            - name: DATABASE_URL
              value: postgresql://orderflow:orderflow123@postgres:5432/orderflow
            - name: RABBITMQ_URL
              value: amqp://orderflow:orderflow123@rabbitmq:5672/
            - name: REDIS_URL
              value: redis://redis:6379
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
